<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Kat Kosmetics</title>
    <link rel="stylesheet" href="styles.css">
    <body>

<nav>
    <a href="index.html" class="logo">KAT KOSMETICS</a>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="Shop.html">Shop</a></li>
        <li><a href="Cart.html">Back to Cart</a></li>
    </ul>
</nav>

<div class="container">
    <h1>Checkout</h1>

    <div class="form-section">
        <form>
            <h2>Shipping Information</h2>
            <div class="form-row">
                <input type="text" placeholder="First Name">
                <input type="text" placeholder="Last Name">
            </div>
            <input type="text" placeholder="Address (e.g. 1777 West Street)">
            <div class="form-row">
                <input type="text" placeholder="City">
                <input type="text" placeholder="Postal Code (97205)">
            </div>
            <input type="email" placeholder="Email for tracking updates">

            <h2>Payment Method</h2>
            <input type="text" placeholder="Cardholder Name">
            <input type="text" placeholder="Card Number (0000 0000 0000 0000)">
            <div class="form-row">
                <input type="text" placeholder="MM / YY">
                <input type="text" placeholder="CVV">
            </div>
        </form>
    </div>

    <aside class="order-summary">
        <h2 style="margin-top: 0; border: none;">Order Summary</h2>
        <div class="summary-item">
            <span>Serengeti Eyeshadow Palette</span>
            <span>$42.00</span>
        </div>
        <div class="summary-item">
            <span>Shipping</span>
            <span style="color: var(--forest-green); font-weight: bold;">FREE</span>
        </div>
        <div class="summary-item">
            <span>Tax</span>
            <span>$3.36</span>
        </div>
        <div class="summary-item total-row">
            <span>Total</span>
            <span>$45.36</span>
        </div>
        <button type="button" class="btn">Complete Purchase</button>
        <p style="font-size: 0.75rem; text-align: center; color: #888; margin-top: 15px;">
            Secure Encrypted Transaction
        </p>
    </aside>
</div>

<footer>
    <p>&copy; 2026 Kat Kosmetics. Rooted in Beauty, Inspired by Africa.</p>
</footer>

</body>
</html>
