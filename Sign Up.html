<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Tribe | Kat Kosmetics</title>
    <link rel="stylesheet" href="styles.css">
    body>

<nav>
    <a href="index.html" class="logo">KAT KOSMETICS</a>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="Shop.html">Shop</a></li>
        <li><a href="Sign In.html">Sign In</a></li>
    </ul>
</nav>

<main class="signup-container">
    <div class="signup-card">
        <h1>Join the Tribe</h1>
        <p>Created by Africans, for Africans. Sign up for exclusive drops and beauty tips.</p>
        
        <form>
            <div class="form-row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" placeholder="Abeba">
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" placeholder="Mensah">
                </div>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="name@email.com">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label>Confirm</label>
                    <input type="password" placeholder="••••••••">
                </div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="terms">
                <label for="terms">I agree to the Terms of Service and Privacy Policy.</label>
            </div>

            <button type="button" class="btn">Create Account</button>
        </form>

        <p class="footer-link">Already have an account? <a href="Sign In.html">Sign In</a></p>
    </div>
</main>

<footer>
    <p>&copy; 2026 Kat Kosmetics. Rooted in Beauty.</p>
</footer>

</body>
</html>
