<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Tribe | Kat Kosmetics</title>
    <link rel="stylesheet" href="styles.css">
    <body>

<nav>
    <a href="index.html" class="logo">KAT KOSMETICS</a>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="Shop.html">Shop</a></li>
        <li><a href="Sign Up.html">Join Us</a></li>
    </ul>
</nav>

<main class="signin-container">
    <div class="signin-card">
        <h1>Welcome Back</h1>
        <p>Log in to access your saved shades and orders.</p>
        
        <form>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="name@email.com" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>

            <div class="options-row">
                <label style="font-weight: normal; color: #666; cursor: pointer;">
                    <input type="checkbox" style="width: auto;"> Remember me
                </label>
                <a href="#" class="forgot-pass">Forgot password?</a>
            </div>

            <button type="button" class="btn">Login</button>
        </form>

        <p class="signup-link">New to Kat Kosmetics? <a href="Sign Up.html">Create an account</a></p>
    </div>
</main>

<footer>
    <p>&copy; 2026 Kat Kosmetics. All Rights Reserved.</p>
</footer>

</body>
</html>
